                // ── Quotes Carousel ──
                // Fetches inspirational quotes from a free API and displays
                // them in a rotating carousel with smooth transitions.
                function QuotesCarousel() {
                    const [quotes, setQuotes] = React.useState([]);
                    const [index, setIndex] = React.useState(0);
                    const [fade, setFade] = React.useState(true);
                    const [loading, setLoading] = React.useState(true);

                    // Curated fallback quotes (stoic / philosophical)
                    const fallback = [
                        { content: "You have power over your mind - not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius" },
                        { content: "We suffer more often in imagination than in reality.", author: "Seneca" },
                        { content: "He who has a why to live can bear almost any how.", author: "Friedrich Nietzsche" },
                        { content: "Freedom is what you do with what has been done to you.", author: "Jean-Paul Sartre" },
                        { content: "In the depth of winter, I found there was, within me, an invincible summer.", author: "Albert Camus" },
                        { content: "How we spend our days is, of course, how we spend our lives.", author: "Annie Dillard" },
                        { content: "The only way to make sense out of change is to plunge into it, move with it, and join the dance.", author: "Alan Watts" },
                        { content: "Nature does not hurry, yet everything is accomplished.", author: "Lao Tzu" },
                        { content: "No man is free who is not master of himself.", author: "Epictetus" },
                        { content: "You do not rise to the level of your goals. You fall to the level of your systems.", author: "James Clear" },
                        { content: "Begin at once to live, and count each separate day as a separate life.", author: "Seneca" },
                        { content: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
                    ];

                    React.useEffect(() => {
                        let cancelled = false;
                        async function fetchQuotes() {
                            try {
                                const res = await fetch('https://api.quotable.io/quotes/random?limit=20&tags=wisdom|philosophy|inspirational');
                                if (!res.ok) throw new Error('API error');
                                const data = await res.json();
                                if (!cancelled && Array.isArray(data) && data.length > 0) {
                                    setQuotes(data.map(q => ({ content: q.content, author: q.author })));
                                } else {
                                    throw new Error('empty');
                                }
                            } catch {
                                // Try alternative API
                                try {
                                    const res2 = await fetch('https://zenquotes.io/api/quotes');
                                    if (!res2.ok) throw new Error('zen error');
                                    const data2 = await res2.json();
                                    if (!cancelled && Array.isArray(data2) && data2.length > 0) {
                                        setQuotes(data2.map(q => ({ content: q.q, author: q.a })));
                                    } else {
                                        throw new Error('empty');
                                    }
                                } catch {
                                    if (!cancelled) setQuotes(fallback);
                                }
                            }
                            if (!cancelled) setLoading(false);
                        }
                        fetchQuotes();
                        return () => { cancelled = true; };
                    }, []);

                    // Auto-rotate every 8s
                    React.useEffect(() => {
                        if (quotes.length < 2) return;
                        const id = setInterval(() => {
                            setFade(false);
                            setTimeout(() => {
                                setIndex(i => (i + 1) % quotes.length);
                                setFade(true);
                            }, 400);
                        }, 8000);
                        return () => clearInterval(id);
                    }, [quotes]);

                    const goNext = () => {
                        setFade(false);
                        setTimeout(() => { setIndex(i => (i + 1) % quotes.length); setFade(true); }, 300);
                    };
                    const goPrev = () => {
                        setFade(false);
                        setTimeout(() => { setIndex(i => (i - 1 + quotes.length) % quotes.length); setFade(true); }, 300);
                    };

                    if (loading) {
                        return (
                            <div className="quotes-carousel">
                                <div className="quote-loading">Loading quotes...</div>
                            </div>
                        );
                    }
                    if (!quotes.length) return null;

                    const q = quotes[index];
                    return (
                        <div className="quotes-carousel">
                            <div className={`quote-card ${fade ? 'fade-in' : 'fade-out'}`}>
                                <svg className="quote-mark" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z" fill="currentColor" opacity="0.15"/>
                                </svg>
                                <blockquote className="quote-text">
                                    {q.content}
                                </blockquote>
                                <cite className="quote-author">- {q.author}</cite>
                            </div>
                            <div className="quote-nav">
                                <button className="quote-btn" onClick={goPrev} aria-label="Previous quote">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                </button>
                                <span className="quote-counter">{index + 1} / {quotes.length}</span>
                                <button className="quote-btn" onClick={goNext} aria-label="Next quote">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                </button>
                            </div>
                        </div>
                    );
                }

                        // Chatbot state — fresh each visit, no persistence
            const [chatOpen, setChatOpen] = React.useState(false);
            const [chatInput, setChatInput] = React.useState('');
            const [messages, setMessages] = React.useState([
                { from: 'bot', text: "Hi! I\'m Diego\'s assistant. Ask me about his experience, skills, projects, or how to get in touch." }
            ]);
            const [typing, setTyping] = React.useState(false);
            const messagesEndRef = React.useRef(null);
            React.useEffect(() => { if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const assistantEngine = new (window.AssistantEngine || function(){ return { ask: async () => 'Assistant not loaded' }; })();

            const handleChatSend = async () => {
                if (chatInput.trim() === '' || typing) return;
                const input = chatInput.trim();
                setMessages(prev => [...prev, { from: 'user', text: input }]);
                setChatInput('');
                setTyping(true);
                try {
                    const reply = await assistantEngine.ask(input);
                    // Simulate natural typing delay (600-1200ms)
                    const delay = Math.min(600 + reply.length * 8, 1800);
                    await new Promise(r => setTimeout(r, delay));
                    setMessages(prev => [...prev, { from: 'bot', text: reply }]);

    <!-- Initialize interactive wipe effect for Home hero -->
    <script>
        (function(){
            
            function initWipe(){
                const rootFlag = (document.body && document.body.getAttribute('data-hero-reveal')) || 'on';
                if (rootFlag !== 'on') return; // kill-switch

                const canvas = document.getElementById('wipeCanvas');
                const revealBtn = document.getElementById('reveal-now');
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                const DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
                const overlay = new Image();
                overlay.src = 'images/Golden Trunks and Blue Sky.png';
                overlay.onerror = () => { /* fail open */ revealInstant(); };
                let brushRadius = Math.max(50, Math.min(90, Math.floor((window.innerWidth||800) * 0.05))); // responsive brush
                let paused = false;
                let revealed = false; // false = overlay visible; true = clear image

                // Reduced motion: skip scratching and crossfade
                const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

                function sizeCanvas(){
                    const rect = canvas.getBoundingClientRect();
                    const w = rect.width || window.innerWidth;
                    const h = rect.height || window.innerHeight;
                    canvas.style.width = w + 'px';
                    canvas.style.height = h + 'px';
                    canvas.width = Math.floor(w * DPR);
                    canvas.height = Math.floor(h * DPR);
                    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
                }

                function drawOverlay(){
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    // soft blur for the overlay to create contrast with underlay
                    ctx.filter = 'blur(10px)';
                    const cw = canvas.width / DPR;
                    const ch = canvas.height / DPR;
                    const iw = overlay.naturalWidth || overlay.width;
                    const ih = overlay.naturalHeight || overlay.height;
                    if (iw && ih) {
                        const scale = Math.max(cw / iw, ch / ih);
                        const dw = iw * scale;
                        const dh = ih * scale;
                        const dx = (cw - dw) / 2;
                        const dy = (ch - dh) / 2;
                        // feather: draw with a slight bleed to avoid edge seams after blur
                        const pad = 24; // CSS px
                        ctx.drawImage(overlay, dx - pad, dy - pad, dw + pad*2, dh + pad*2);
                    } else {
                        ctx.drawImage(overlay, 0, 0, cw, ch);
                    }
                    ctx.filter = 'none';
                }

                function eraseAt(x,y){
                    const r = brushRadius;
                    ctx.save();
                    ctx.globalCompositeOperation = 'destination-out';
                    const g = ctx.createRadialGradient(x,y, r*0.5, x,y, r);
                    g.addColorStop(0,'rgba(0,0,0,0.9)');
                    g.addColorStop(1,'rgba(0,0,0,0)');
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(x,y,r,0,Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }

                function getXY(e){
                    const rect = canvas.getBoundingClientRect();
                    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
                }

                // Progress estimation using downscaled alpha sampling
                const sampleCanvas = document.createElement('canvas');
                const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
                sampleCanvas.width = 64; sampleCanvas.height = 64;
                let lastSampleTs = 0;
                function estimateCleared(){
                    const now = performance.now();
                    if (now - lastSampleTs < 300) return 0; // throttle
                    lastSampleTs = now;
                    sampleCtx.clearRect(0,0,64,64);
                    sampleCtx.drawImage(canvas, 0, 0, 64, 64);
                    const data = sampleCtx.getImageData(0,0,64,64).data;
                    let cleared = 0, total = 64*64;
                    for (let i=3; i<data.length; i+=4){ // alpha channel
                        if (data[i] < 16) cleared++;
                    }
                    return cleared / total;
                }

                function revealInstant(){
                    if (revealed) return;
                    revealed = true;
                    canvas.hidden = true;
                    canvas.style.opacity = '0';
                    canvas.style.pointerEvents = 'none';
                }

                function showOverlay(){
                    if (!revealed) return;
                    revealed = false;
                    canvas.hidden = false;
                    canvas.style.opacity = '1';
                    canvas.style.pointerEvents = paused ? 'none' : 'auto';
                    if (overlay && (overlay.complete || overlay.naturalWidth)) { drawOverlay(); }
                }

                // Pointer handling
                let down = false;
                function onDown(e){ if (paused || revealed) return; down = true; const p=getXY(e); eraseAt(p.x,p.y); checkProgress(true); }
                function onMove(e){ if (paused || revealed || !down) return; const p=getXY(e); eraseAt(p.x,p.y); checkProgress(false); }
                function onUp(){ down = false; }
                function onCancel(){ down = false; }

                function checkProgress(force){
                    if (!force && paused) return;
                    const ratio = estimateCleared();
                    if (ratio >= 0.6) revealInstant();
                }

                // Pause work when hero is offscreen
                const io = new IntersectionObserver((entries)=>{
                    const entry = entries[0];
                    paused = !entry.isIntersecting;
                    canvas.style.pointerEvents = paused ? 'none' : (revealed ? 'none' : 'auto');
                }, { threshold: 0.05 });
                const hero = canvas.closest('.wipe-hero');
                if (hero) io.observe(hero);

                // Wire listeners
                canvas.addEventListener('pointerdown', onDown);
                canvas.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
                window.addEventListener('pointercancel', onCancel);
                window.addEventListener('resize', ()=>{ sizeCanvas(); if (overlay.complete) drawOverlay(); brushRadius = Math.max(50, Math.min(90, Math.floor((window.innerWidth||800) * 0.05))); });
                if (revealBtn) revealBtn.addEventListener('click', ()=>{ revealed ? showOverlay() : revealInstant(); });

                overlay.onload = () => {
                    sizeCanvas();
                    drawOverlay();
                    if (prefersReduced) {
                        // Respect reduced motion preference
                        requestAnimationFrame(revealInstant);
                    }
                };

                // If image already cached
                if (overlay.complete) {
                    sizeCanvas();
                    drawOverlay();
                    if (prefersReduced) requestAnimationFrame(revealInstant);
                }
            }
            // Initialize after load/idle to avoid contending with LCP
            function schedule(){
                if ('requestIdleCallback' in window) {
                    requestIdleCallback(()=> initWipe(), { timeout: 1500 });
                } else {
                    setTimeout(initWipe, 600);
                }
            }
            window.addEventListener('load', schedule, { once: true });
        })();
    </script>

    <script>
        // Toggle minimal transparent navbar at top of the page
        (function(){
            function onScroll(){
                const atTop = window.scrollY < 8; // small threshold
                document.documentElement.classList.toggle('at-top', atTop);
            }
            window.addEventListener('scroll', onScroll, { passive: true });

    <!-- Dark mode toggle logic (runs early to prevent flash) -->
    <script>
        (function(){
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
            // Listen for toggle
            document.addEventListener('click', function(e){
                const btn = e.target.closest('#theme-toggle');
                if (!btn) return;
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                }
            });
        })();
    </script>

    <!-- Scroll-to-top visibility -->
    <script>
        (function(){
            function updateScrollTop(){
                var btn = document.getElementById('scroll-top');
                if (!btn) return;
                if (window.scrollY > 400) btn.classList.add('visible');
                else btn.classList.remove('visible');
            }
            window.addEventListener('scroll', updateScrollTop, { passive: true });
            window.addEventListener('load', updateScrollTop);
        })();
    </script>

    <!-- Hero role typing animation -->
    <script>
        (function(){
            var text = 'AI & Software Engineer';
            var el = document.getElementById('hero-role-text');
            if (!el) return;
            var i = 0;
            function type(){
                if (i <= text.length) {
                    el.textContent = text.slice(0, i);
                    i++;
                    setTimeout(type, 60 + Math.random() * 40);
                }
            }
            // Start after hero animations finish (~0.5s)
            setTimeout(type, 600);

    <!-- Scroll progress bar -->
    <div class="scroll-progress" id="scroll-progress" style="width:0"></div>

    <script>
        // Scroll progress indicator
        (function(){
            const bar = document.getElementById('scroll-progress');
            if (!bar) return;
            function updateProgress(){
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                bar.style.width = pct + '%';
            }
            window.addEventListener('scroll', updateProgress, { passive: true });
            updateProgress();
        })();

        // Scroll-triggered reveal animations
        (function(){
            function initReveals(){
                const els = document.querySelectorAll('.reveal-on-scroll');
                if (!els.length) return;
                const obs = new IntersectionObserver((entries) => {
                    entries.forEach((entry, i) => {
                        if (entry.isIntersecting) {
                            // Stagger animation for siblings
                            const parent = entry.target.parentElement;
                            const siblings = parent ? Array.from(parent.querySelectorAll('.reveal-on-scroll')) : [];
                            const idx = siblings.indexOf(entry.target);
                            const delay = idx >= 0 ? idx * 80 : 0;
                            setTimeout(() => {
                                entry.target.classList.add('revealed');
                            }, delay);
                            obs.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
                els.forEach(el => obs.observe(el));
            }
            // Run after React mounts
            function schedule(){
                if ('requestIdleCallback' in window) requestIdleCallback(initReveals, { timeout: 3000 });
                else setTimeout(initReveals, 2000);
            }
            window.addEventListener('load', schedule, { once: true });
        })();

        // Animated number counters for hero stats
        (function(){
            function animateCounters(){
                const counters = document.querySelectorAll('.stat-number[data-count], .about-stat-number[data-count]');
                if (!counters.length) return;
                const obs = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const el = entry.target;
                            const target = parseInt(el.getAttribute('data-count'), 10);
                            if (isNaN(target)) return;
                            let current = 0;
                            const duration = 1500;
                            const steps = 40;
                            const increment = target / steps;
                            const stepMs = duration / steps;
                            const timer = setInterval(() => {
                                current += increment;
                                if (current >= target) {
                                    el.textContent = target + '+';
                                    clearInterval(timer);
                                } else {
                                    el.textContent = Math.floor(current) + '+';
                                }
                            }, stepMs);
                            obs.unobserve(el);
                        }
                    });
                }, { threshold: 0.5 });
                counters.forEach(c => obs.observe(c));
            }
            window.addEventListener('load', () => setTimeout(animateCounters, 500), { once: true });
        })();

        // Tilt effect on project cards
        (function(){
            function initTilt(){
                const cards = document.querySelectorAll('[data-tilt]');
                cards.forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        const centerX = rect.width / 2;
                        const centerY = rect.height / 2;
                        const rotateX = ((y - centerY) / centerY) * -4;
                        const rotateY = ((x - centerX) / centerX) * 4;
                        card.style.transform = 'perspective(800px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) translateY(-4px)';
                    });
                    card.addEventListener('mouseleave', () => {
                        card.style.transform = '';
                    });
                });
            }
            window.addEventListener('load', () => setTimeout(initTilt, 2500), { once: true });
        })();
    </script>
    
    <script>
        // Contact section functionality with validation, rate limit, and inline success
        document.addEventListener('DOMContentLoaded', function() {
            const emailLink = document.getElementById('email-link');
            const copyBtn = document.getElementById('copy-email');
            const openBtn = document.getElementById('open-email');
            const toast = document.getElementById('toast');
            const contactForm = document.getElementById('contact-form');
            const formStatus = document.getElementById('form-status');
            const sendBtn = document.getElementById('send-btn');
            const successCard = document.getElementById('contact-success');
            const emailAgain = document.getElementById('email-again');
            const startTs = document.getElementById('form_started_at');

            // Reconstruct email address from obfuscated parts
            let realEmail = '';
            if (emailLink && emailLink.dataset.emailUser && emailLink.dataset.emailDomain) {
                realEmail = emailLink.dataset.emailUser + '@' + emailLink.dataset.emailDomain;
                emailLink.href = 'mailto:' + realEmail;
            }

            // Copy utility with toast and fallback
            function showToast(msg){
                if (!toast) return;
                toast.textContent = msg;
                toast.hidden = false;
                toast.classList.add('show');
                setTimeout(()=>{ toast.hidden=true; toast.classList.remove('show'); }, 2500);
            }
            async function copyText(text){
                try { await navigator.clipboard.writeText(text); return true; }
                catch {
                    const el = document.createElement('input');
                    el.value = text; document.body.appendChild(el); el.select();
                    try { document.execCommand('copy'); } catch { document.body.removeChild(el); return false; }
                    document.body.removeChild(el); return true;
                }
            }
            if (copyBtn) {
                copyBtn.addEventListener('click', async () => {
                    const ok = await copyText(realEmail || '');
                    showToast(ok ? 'Email copied' : 'Copy failed — use the email button');
                });
            }
            if (openBtn) {
                openBtn.addEventListener('click', () => {
                    const subject = encodeURIComponent('Portfolio inquiry');
                    const body = encodeURIComponent('Hi Diego,\n\n');
                    const href = `mailto:${realEmail}?subject=${subject}&body=${body}`;
                    window.location.href = href;
                });
            }

            if (emailAgain) {
                emailAgain.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (successCard) successCard.hidden = true;
                    if (contactForm) {
                        contactForm.reset();
                        contactForm.hidden = false;
                        const name = document.getElementById('name');
                        if (name) name.focus();
                    }
                });
            }

            // Inline success if URL has ?success=1
            if (location.search.includes('success=1')) {
                if (contactForm) contactForm.hidden = true;
                if (successCard) successCard.hidden = false;
            }

            // Initialize honeypot timestamp
            if (startTs) startTs.value = Date.now();

            function setError(input, msg){
                if (!input) return;
                input.setAttribute('aria-invalid','true');
                const id = input.id + '-err';
                let p = document.getElementById(id);
                if (!p) { p = document.createElement('p'); p.id = id; p.className = 'err'; p.setAttribute('role','alert'); input.parentNode.appendChild(p); }
                p.textContent = msg;
                const describedby = (input.getAttribute('aria-describedby')||'').split(' ').filter(Boolean);
                if (!describedby.includes(id)) { describedby.push(id); input.setAttribute('aria-describedby', describedby.join(' ')); }
            }
            function clearError(input){
                if (!input) return;
                input.removeAttribute('aria-invalid');
                const id = input.id + '-err';
                const p = document.getElementById(id);
                if (p) p.remove();
                const describedby = (input.getAttribute('aria-describedby')||'').split(' ').filter(t=>t && t!==id);
                if (describedby.length) input.setAttribute('aria-describedby', describedby.join(' ')); else input.removeAttribute('aria-describedby');
            }

            function validate(){
                const name = document.getElementById('name');
                const email = document.getElementById('email');
                const message = document.getElementById('message');
                let firstInvalid = null;
                // name
                if (!name.value || name.value.trim().length < 2) { setError(name,'Please enter at least 2 characters.'); firstInvalid = firstInvalid || name; } else clearError(name);
                // email RFC-5322-light
                const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim());
                if (!emailOk) { setError(email,'Enter a valid email address.'); firstInvalid = firstInvalid || email; } else clearError(email);
                // message length
                const len = (message.value||'').trim().length;
                if (len < 20 || len > 2000) { setError(message,'Message must be 20–2000 characters.'); firstInvalid = firstInvalid || message; } else clearError(message);
                return firstInvalid;
            }

            let busy = false; let lastSent = 0; let countdownTimer = null;
            function startCooldown(){
                const total = 30; let left = total;
                function tick(){
                    if (!sendBtn) return; left -= 1;
                    if (left <= 0){ sendBtn.disabled=false; sendBtn.textContent='Send message'; clearInterval(countdownTimer); countdownTimer=null; }
                    else { sendBtn.textContent = `Wait ${left}s…`; }
                }
                sendBtn.disabled = true; sendBtn.textContent = `Wait ${left}s…`;
                countdownTimer = setInterval(tick, 1000);
            }

            if (contactForm) {
                contactForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    if (busy) return;

                    const firstInvalid = validate();
                    if (firstInvalid) { firstInvalid.focus(); return; }

                    // Honeypot time threshold
                    const started = Number(startTs && startTs.value || 0);
                    if (!started || (Date.now() - started) < 3000){
                        formStatus.textContent = 'Please take a moment to complete the form.';
                        return;
                    }

                    busy = true; sendBtn.disabled = true; sendBtn.textContent = 'Sending…'; formStatus.textContent = '';

                    try {
                        const resp = await fetch(contactForm.action, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                            body: JSON.stringify(Object.fromEntries(new FormData(contactForm)))
                        });
                        const data = await resp.json();
                        if (data.success) {
                            contactForm.hidden = true; if (successCard) successCard.hidden = false; lastSent = Date.now();
                            startCooldown();
                        } else {
                            formStatus.textContent = data.message || 'Something went wrong — try emailing me directly.';
                            sendBtn.disabled = false; sendBtn.textContent = 'Send message';
                        }
                    } catch (err) {
                        formStatus.textContent = 'Network error — try again or email me directly.';
                        sendBtn.disabled = false; sendBtn.textContent = 'Send message';
                    } finally { busy = false; }
                });
            }

            if (emailAgain) {
                emailAgain.addEventListener('click', (e)=>{
                    e.preventDefault();
                    if (successCard) successCard.hidden = true; if (contactForm) contactForm.hidden = false; contactForm.reset(); clearError(document.getElementById('name')); clearError(document.getElementById('email')); clearError(document.getElementById('message')); if (startTs) startTs.value = Date.now();
                });
            }
        });
    </script>
